  category: schema
  summary: 'Top journal percentile (Top 10%) for a paper is NOT computed using a fixed
    CiteScore year (e.g. 2024 for all papers). The correct rule is: for each (srcid,
    sort_year) pair, look up the CiteScore calculation whose year matches the paper''s
    sort_year and whose status is ''Complete''. From that calculation''s csSubjectCategory
    array, take the best (max) csPercentile across all ASJC categories. If no ''Complete''
    calculation exists for the paper''s sort_year, fall forward to the earliest available
    future year with a ''Complete'' calculation (never fall back to a past year).
    Flag the paper as top-10% journal if best_percentile >= 90. This matches SciVal''s
    per-paper journal-level percentile behaviour and is the method needed to reproduce
    ''Top journal percentiles (Top 10%)'' portfolio metrics.'
  confidence: high
  impact: high
