  memory_type: procedural
  category: tooling
  summary: When a Databricks notebook run launched via databricks jobs submit fails,
    the parent submit run often exposes only a generic workload failure. The reliable
    debugging path is to call databricks jobs get-run on the parent run, extract tasks[].run_id,
    then call databricks jobs get-run-output on the task-level run id to read the
    real error and error_trace. For multi-task or submit runs, get-run-output on the
    parent run is often empty or misleading, and exported static notebook HTML can
    also hide the real failure behind a client-side Network Error wrapper.
  confidence: high
