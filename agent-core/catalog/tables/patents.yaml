name: Patents
aliases: [patents, npl, non-patent literature, intellectual property, knowledge transfer]
spark_table: null   # via snapshot_functions / direct spark.table
helper: "patents.join_npl_citations()"

primary_key:
  name: eid
  type: long
  context: "in npl_citations_scopus table"

available_tables:
  - metadata          # 174M patents
  - npl_citations_scopus  # 39M NPL citations with resolved Scopus EIDs

join_rules:
  default_join_type: left
  join_to_ani: "Patents.npl_citations_scopus.eid = ANI.Eid (direct long match)"
  coverage: very_partial
  caveat: >
    Only ~15% of NPL citations resolve to a Scopus EID. LEFT JOIN.
    npl_citations_scopus lags by ~5 months vs patents.metadata.

freshness:
  lag_months: 5
  last_verified_at: "2026-03-01"

size:
  metadata_approx_rows: 174_000_000
  npl_citations_approx_rows: 39_000_000

references:
  summary: agent-core/references/patents.md
  examples:
    - agent-core/recipes/patents-citation-analysis.md

validators:
  - use_left_join_to_ani
  - note_15pct_coverage
  - cache_large_intermediates
